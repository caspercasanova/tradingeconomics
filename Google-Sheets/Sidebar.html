<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 14px;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      margin: 0;
    }

    .hidden {
      display: none !important;
    }

    .section {
      margin-bottom: 14px;
      border: 1px solid #e6e6e6;
      border-radius: 8px;
      padding: 12px;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
    }

    label {
      display: block;
      margin: 8px 0 4px 0;
      font-weight: 600;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 14px;
    }

    input, select {
      border: 1px solid #ccc;
    }

    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear {
      display: none;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .input-wrap input {
      margin-bottom: 0;
      padding-right: 36px;
    }

    .eye-btn {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 36px;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
    }

    .eye-btn:hover {
      color: #333;
    }

    button {
      border: none;
      background: #21a364;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #f3f3f3;
      color: #333;
      border: 1px solid #ddd;
    }

    .small {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .search-dropdown-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .search-input {
      width: 100% !important;
      box-sizing: border-box;
      padding: 8px !important;
      margin-bottom: 0 !important;
      border-radius: 6px !important;
      font-size: 14px !important;
      border: 1px solid #ccc !important;
    }

    .search-dropdown-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      display: none;
    }

    .search-dropdown-list.active {
      display: block;
    }

    .search-dropdown-item {
      padding: 8px;
      cursor: pointer;
      user-select: none;
    }

    .search-dropdown-item:hover {
      background-color: #f0f0f0;
    }

    .search-dropdown-item.selected {
      background-color: #e8f5e9;
      font-weight: 600;
    }

    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #e8f5e9;
      color: #333;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      max-width: 100%;
      word-break: break-all;
    }

    .tag-remove {
      cursor: pointer;
      font-weight: bold;
      color: #888;
      font-size: 14px;
      line-height: 1;
    }

    .tag-remove:hover {
      color: #d32f2f;
    }

    .spinner-overlay {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #e0e0e0;
      border-top-color: #21a364;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      margin-top: auto;
      padding: 14px 0 4px 0;
      border-top: 1px solid #e6e6e6;
      font-size: 12px;
      color: #888;
    }

    footer .footer-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    footer .footer-link {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }

    footer .footer-link svg {
      flex-shrink: 0;
      margin-top: 1px;
      color: #21a364;
    }

    footer a {
      color: #21a364;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

function showSpinner() {

function show(viewId) {
  hideSpinner();
  $('setupView').classList.add('hidden');
  $('appView').classList.add('hidden');
  $('settingsView').classList.add('hidden');
  $(viewId).classList.remove('hidden');

  input.addEventListener('focus', function onFocus() {
    if (input.value.startsWith('\u2022')) input.value = '';
    input.removeEventListener('focus', onFocus);
  }, { once: true });
}

function renderActions() {

    const option = document.createElement('option');
    option.value = index;
    option.textContent = action.label;
    actionSelect.appendChild(option);
  });

var multiSelectState = {};

function createCountryDropdown(multi) {
  return createSearchDropdown('country', COUNTRIES, 'Search countries...', multi);
}

function createIndicatorDropdown(multi) {
  return createSearchDropdown('indicator', INDICATORS, 'Search indicators...', multi);
}

function createTickerDropdown(multi) {
  return createSearchDropdown('ticker', TICKERS, 'Search tickers...', multi);
}

function createSearchDropdown(fieldName, options, placeholder, multi) {
  var uid = fieldName + '_' + Date.now();
  if (multi) multiSelectState[fieldName] = multiSelectState[fieldName] || [];

  var wrapper = document.createElement('div');
  wrapper.className = 'search-dropdown-wrap';

  var tagsDiv = null;
  if (multi) {
    tagsDiv = document.createElement('div');
    tagsDiv.className = 'tags-wrap';
    tagsDiv.id = 'tags-' + fieldName;
    wrapper.appendChild(tagsDiv);
    renderTags(fieldName, options, tagsDiv);
  }

  var searchInput = document.createElement('input');
  searchInput.className = 'search-input';
  searchInput.id = 'field_' + fieldName;
  searchInput.type = 'text';
  searchInput.placeholder = placeholder || 'Search...';
  searchInput.autocomplete = 'off';
  if (multi) searchInput.dataset.multi = '1';

  var dropdownList = document.createElement('div');
  dropdownList.className = 'search-dropdown-list';
  dropdownList.id = 'dropdown-list-' + fieldName;

  wrapper.appendChild(searchInput);
  wrapper.appendChild(dropdownList);

  searchInput.addEventListener('focus', function () {
    renderSearchDropdown(fieldName, options, '', multi);
    dropdownList.classList.add('active');
  });

  searchInput.addEventListener('input', function () {
    renderSearchDropdown(fieldName, options, this.value, multi);
    dropdownList.classList.add('active');
  });

  document.addEventListener('click', function (e) {
    if (!wrapper.contains(e.target)) {
      dropdownList.classList.remove('active');
    }
  });

  return wrapper;
}

function renderTags(fieldName, options, tagsDiv) {
  if (!tagsDiv) tagsDiv = $('tags-' + fieldName);
  if (!tagsDiv) return;
  var selected = multiSelectState[fieldName] || [];
  tagsDiv.innerHTML = '';
  selected.forEach(function (val) {
    var tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = val;
    var remove = document.createElement('span');
    remove.className = 'tag-remove';
    remove.textContent = '\u00d7';
    remove.addEventListener('click', function () {
      var arr = multiSelectState[fieldName] || [];
      multiSelectState[fieldName] = arr.filter(function (v) { return v !== val; });
      renderTags(fieldName, options);
      var dl = $('dropdown-list-' + fieldName);
      if (dl && dl.classList.contains('active')) {
        var input = $('field_' + fieldName);
        renderSearchDropdown(fieldName, options, input ? input.value : '', true);
      }
    });
    tag.appendChild(remove);
    tagsDiv.appendChild(tag);
  });
}

function renderSearchDropdown(fieldName, options, searchTerm, multi) {
  var dropdownList = $('dropdown-list-' + fieldName);
  if (!dropdownList) return;

  dropdownList.innerHTML = '';
  var searchLower = searchTerm.toLowerCase();
  var filtered = (options || []).filter(function (item) {
    return String(item).toLowerCase().includes(searchLower);
  });

  var currentInput = $('field_' + fieldName);
  var selected = multi ? (multiSelectState[fieldName] || []) : [];
  var currentValue = (!multi && currentInput) ? currentInput.value : '';

  filtered.slice(0, 120).forEach(function (itemValue) {
    var item = document.createElement('div');
    item.className = 'search-dropdown-item';
    if (multi) {
      if (selected.indexOf(itemValue) >= 0) item.classList.add('selected');
    } else {
      if (String(itemValue).toLowerCase() === String(currentValue).toLowerCase()) {
        item.classList.add('selected');
      }
    }
    item.textContent = itemValue;
    item.addEventListener('click', function () {
      if (multi) {
        var arr = multiSelectState[fieldName] || [];
        var idx = arr.indexOf(itemValue);
        if (idx >= 0) {
          arr.splice(idx, 1);
        } else {
          arr.push(itemValue);
        }
        multiSelectState[fieldName] = arr;
        renderTags(fieldName, options);
        item.classList.toggle('selected');
        if (currentInput) currentInput.value = '';
        renderSearchDropdown(fieldName, options, '', true);
        dropdownList.classList.add('active');
        if (currentInput) currentInput.focus();
      } else {
        if (currentInput) currentInput.value = itemValue;
        dropdownList.classList.remove('active');
      }
    });
    dropdownList.appendChild(item);
  });

  if (!filtered.length) {
    var empty = document.createElement('div');
    empty.className = 'search-dropdown-item';
    empty.textContent = 'No matches found';
    empty.style.color = '#888';
    empty.style.cursor = 'default';
    dropdownList.appendChild(empty);
  }
}

function renderFields() {
  var category = $('categorySelect').value;
  var action = ACTIONS[category][$('actionSelect').value];
  var fieldsDiv = $('fields');
  fieldsDiv.innerHTML = '';
  multiSelectState = {};

  (action.fields || []).forEach(function (field) {
    const label = document.createElement('label');
    label.textContent = FIELD_LABELS[field] || field;
    fieldsDiv.appendChild(label);

    if (field === 'country') {
      var multiCountry = category === 'indicators' && action.multiFields && action.multiFields.indexOf('country') >= 0;
      fieldsDiv.appendChild(createCountryDropdown(multiCountry));
      return;
    }

    if (field === 'indicator' && INDICATORS.length) {
      var multiIndicator = category === 'indicators' && action.multiFields && action.multiFields.indexOf('indicator') >= 0;
      fieldsDiv.appendChild(createIndicatorDropdown(multiIndicator));
      return;
    }

    if (field === 'ticker' && TICKERS.length) {
      var multiTicker = category === 'indicators' && action.multiFields && action.multiFields.indexOf('ticker') >= 0;
      fieldsDiv.appendChild(createTickerDropdown(multiTicker));
      return;
    }

    const input = document.createElement('input');
    input.id = 'field_' + field;

    if (field === 'startDate' || field === 'endDate') {
      input.type = 'date';
    } else if (field === 'fromDateTime' || field === 'toDateTime') {
      input.type = 'datetime-local';
    } else if (field === 'startIndex' || field === 'listSize') {
      input.type = 'number';
    } else {
      input.type = 'text';
    }

    fieldsDiv.appendChild(input);
  });
}

function getFieldValues() {
  var category = $('categorySelect').value;
  var action = ACTIONS[category][$('actionSelect').value];
  var values = {};
  var multiFields = action.multiFields || [];

  (action.fields || []).forEach(function (field) {
    if (multiFields.indexOf(field) >= 0 && multiSelectState[field] && multiSelectState[field].length) {
      values[field] = multiSelectState[field].join(',');
    } else {
      values[field] = $('field_' + field).value.trim();
    }
  });

  return values;
}

function runSelectedAction() {
  const category = $('categorySelect').value;
  const action = ACTIONS[category][$('actionSelect').value];
  const values = getFieldValues();

  if (action.fields) {
    for (const f of action.fields) {
      if (!values[f]) {
        alert('Please fill: ' + FIELD_LABELS[f]);
        return;
      }
    }
  }

  const path = action.build(values);
  const format = action.pivot ? 'pivot' : 'default';
  const btn = $('runBtn');
  btn.disabled = true;
  showSpinner();

  google.script.run
    .withSuccessHandler(function () {
      btn.disabled = false;
      show('appView');
    })
    .withFailureHandler(function (err) {
      btn.disabled = false;
      show('appView');
      alert(err.message);
    })
    .runApiRequest(path, format);
}

function isApiKeyFormatValid(key) {
  return /^[A-Za-z0-9]{8,64}:[A-Za-z0-9]{8,64}$/.test(key);
}

function saveFirstKey() {
  const key = $('apiKeyInput').value.trim();
  if (!isApiKeyFormatValid(key)) {
    alert('Invalid API key format. Expected alphanumeric:alphanumeric (for example abc123def456ghi7:xyz987uvw654rst). Please subscribe to a plan at https://tradingeconomics.com/api/pricing.aspx to get an API key.');
    return;
  }
  showSpinner();

  google.script.run
    .withSuccessHandler(function () {
      show('appView');
      $('categorySelect').value = 'indicators';
      renderActions();
    })
    .withFailureHandler(function (err) {
      show('setupView');
      alert(err.message);
    })
    .saveApiKey(key);
}

function updateKey() {
  const key = $('newApiKeyInput').value.trim();
  if (!isApiKeyFormatValid(key)) {
    alert('Invalid API key format. Expected alphanumeric:alphanumeric (for example abc123def456ghi7:xyz987uvw654rst). Please subscribe to a plan at https://tradingeconomics.com/api/pricing.aspx to get an API key.');
    return;
  }
  showSpinner();

  google.script.run
    .withSuccessHandler(function () {
      hasApiKey = true;
      show('appView');
      $('categorySelect').value = 'indicators';
      renderActions();
    })
    .withFailureHandler(function (err) {
      showSettingsView();
      alert(err.message);
    })
    .saveApiKey(key);
}

function removeKey() {
  showSpinner();

  google.script.run
    .withSuccessHandler(function () {
      show('setupView');
    })
    .withFailureHandler(function (err) {
      showSettingsView();
      alert(err.message);
    })
    .clearApiKey();
}

function initialize() {
  showSpinner();

  google.script.run
    .withSuccessHandler(function (lookup) {
      COUNTRIES = Array.isArray(lookup && lookup.countries) ? lookup.countries : [];
      INDICATORS = Array.isArray(lookup && lookup.indicators) ? lookup.indicators : [];
      TICKERS = Array.isArray(lookup && lookup.tickers) ? lookup.tickers : [];

      google.script.run
        .withSuccessHandler(function (state) {
      if (!state.hasApiKey) {
        show('setupView');
        return;
      }

      hasApiKey = true;

      if (INITIAL_STATE.view === 'settings') {
        showSettingsView();
        return;
      }

      show('appView');
      renderActions();

      if (INITIAL_STATE.category && ACTIONS[INITIAL_STATE.category]) {
        $('categorySelect').value = INITIAL_STATE.category;
        renderActions();
      }
    })
    .withFailureHandler(function (err) {
      show('setupView');
      alert(err.message);
    })
    .getAppState();
        })
        .withFailureHandler(function (err) {
          show('setupView');
          alert('Error loading countries/indicators: ' + err.message);
        })
        .getLookupData();
}

$('categorySelect').addEventListener('change', renderActions);
$('actionSelect').addEventListener('change', renderFields);
$('runBtn').addEventListener('click', runSelectedAction);
$('saveKeyBtn').addEventListener('click', saveFirstKey);
$('updateKeyBtn').addEventListener('click', updateKey);
$('removeKeyBtn').addEventListener('click', removeKey);

function toggleVisibility(inputId, btnId) {
  const input = $(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  $(btnId).querySelector('svg').style.opacity = isHidden ? '0.4' : '1';
}

$('toggleApiKeyBtn').addEventListener('click', function () {
  toggleVisibility('apiKeyInput', 'toggleApiKeyBtn');
});

$('toggleNewApiKeyBtn').addEventListener('click', function () {
  toggleVisibility('newApiKeyInput', 'toggleNewApiKeyBtn');
});

initialize();
</script>

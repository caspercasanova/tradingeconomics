<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 14px;
      color: #333;
    }

    .hidden {
      display: none !important;
    }

      margin-bottom: 14px;
      border: 1px solid #e6e6e6;
      border-radius: 8px;
      padding: 12px;
    }

      margin: 0 0 12px 0;
      font-size: 20px;
    }

    label {
      display: block;
      margin: 8px 0 4px 0;
      font-weight: 600;
    }

    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 14px;
    }

    input, select {
      border: 1px solid #ccc;
    }

    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear {
      display: none;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .input-wrap input {
      margin-bottom: 0;
      padding-right: 36px;
    }

    .eye-btn {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 36px;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
    }

    .eye-btn:hover {
      color: #333;
    }

    button {
      border: none;
      background: #21a364;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #f3f3f3;
      color: #333;
      border: 1px solid #ddd;
    }

    .small {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .spinner-overlay {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 0;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #e0e0e0;
      border-top-color: #21a364;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      margin-top: 16px;
      padding: 14px 0 4px 0;
      border-top: 1px solid #e6e6e6;
      font-size: 12px;
      color: #888;
    }

    footer .footer-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    footer .footer-link {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }

    footer .footer-link svg {
      flex-shrink: 0;
      margin-top: 1px;
      color: #21a364;
    }

    footer a {
      color: #21a364;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

const FIELD_LABELS = {
  country: 'Country',
  indicator: 'Indicator',
  ticker: 'Ticker',
  symbol: 'Symbol',
  group: 'Group',
  category: 'Category',
  startDate: 'Start Date',
  endDate: 'End Date',
  fromDateTime: 'From Datetime',
  toDateTime: 'To Datetime',
  calendarId: 'Calendar ID',
  startIndex: 'Start Index',
  listSize: 'List Size',
  seriesCode: 'Series Code',
  state: 'State / Series'
};

function $(id) {
  return document.getElementById(id);
}

function showSpinner() {
  $('spinnerView').classList.remove('hidden');
  $('setupView').classList.add('hidden');
  $('appView').classList.add('hidden');
  $('settingsView').classList.add('hidden');
}

function hideSpinner() {
  $('spinnerView').classList.add('hidden');
}

function show(viewId) {
  hideSpinner();
  $('setupView').classList.add('hidden');
  $('appView').classList.add('hidden');
  $('settingsView').classList.add('hidden');
  $(viewId).classList.remove('hidden');
}

function showSettingsView() {
  show('settingsView');
  const input = $('newApiKeyInput');
  input.value = hasApiKey ? '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022' : '';
  input.addEventListener('focus', function onFocus() {
    if (input.value.startsWith('\u2022')) input.value = '';
    input.removeEventListener('focus', onFocus);
  }, { once: true });
}

function renderActions() {
  const category = $('categorySelect').value;
  const actionSelect = $('actionSelect');
  actionSelect.innerHTML = '';

  ACTIONS[category].forEach(function (action, index) {
    const option = document.createElement('option');
    option.value = index;
    option.textContent = action.label;
    actionSelect.appendChild(option);
  });

  renderFields();
}

function renderFields() {
  const category = $('categorySelect').value;
  const action = ACTIONS[category][$('actionSelect').value];
  const fieldsDiv = $('fields');
  fieldsDiv.innerHTML = '';

  (action.fields || []).forEach(function (field) {
    const label = document.createElement('label');
    label.textContent = FIELD_LABELS[field] || field;
    fieldsDiv.appendChild(label);

    const input = document.createElement('input');
    input.id = 'field_' + field;

    if (field === 'startDate' || field === 'endDate') {
      input.type = 'date';
    } else if (field === 'fromDateTime' || field === 'toDateTime') {
      input.type = 'datetime-local';
    } else if (field === 'startIndex' || field === 'listSize') {
      input.type = 'number';
    } else {
      input.type = 'text';
    }

    fieldsDiv.appendChild(input);
  });
}

function getFieldValues() {
  const category = $('categorySelect').value;
  const action = ACTIONS[category][$('actionSelect').value];
  const values = {};

  (action.fields || []).forEach(function (field) {
    values[field] = $('field_' + field).value.trim();
  });

  return values;
}

function runSelectedAction() {
  const category = $('categorySelect').value;
  const action = ACTIONS[category][$('actionSelect').value];
  const values = getFieldValues();

  if (action.fields) {
    for (const f of action.fields) {
      if (!values[f]) {
        alert('Please fill: ' + FIELD_LABELS[f]);
        return;
      }
    }
  }

  const path = action.build(values);
  const btn = $('runBtn');
  btn.disabled = true;
  showSpinner();

  google.script.run
    .withSuccessHandler(function () {
      btn.disabled = false;
      show('appView');
    })
    .withFailureHandler(function (err) {
      btn.disabled = false;
      show('appView');
      alert(err.message);
    })
    .runApiRequest(path);
}

function isApiKeyFormatValid(key) {
  if (key === 'guest:guest') return true;
  return /^[A-Za-z0-9]{8,64}:[A-Za-z0-9]{8,64}$/.test(key);
}

function saveFirstKey() {
  const key = $('apiKeyInput').value.trim();
  if (!isApiKeyFormatValid(key)) {
    alert('Invalid API key format. Use guest:guest or a key in the format alphanumeric:alphanumeric (for example abc123def456ghi7:xyz987uvw654rst). Get an API key at https://developer.tradingeconomics.com/');
    return;
  }
  showSpinner();

  google.script.run
    .withSuccessHandler(function () {
      if (INITIAL_STATE.view === 'settings') {
        showSettingsView();
        return;
      }

      show('appView');
      renderActions();

      if (INITIAL_STATE.category && ACTIONS[INITIAL_STATE.category]) {
        $('categorySelect').value = INITIAL_STATE.category;
        renderActions();
      }
    })
    .withFailureHandler(function (err) {
      show('setupView');
      alert(err.message);
    })
    .saveApiKey(key);
}

function updateKey() {
  const key = $('newApiKeyInput').value.trim();
  if (!isApiKeyFormatValid(key)) {
    alert('Invalid API key format. Use guest:guest or a key in the format alphanumeric:alphanumeric (for example abc123def456ghi7:xyz987uvw654rst). Get an API key at https://developer.tradingeconomics.com/');
    return;
  }
  showSpinner();

  google.script.run
    .withSuccessHandler(function () {
      hasApiKey = true;
      showSettingsView();
    })
    .withFailureHandler(function (err) {
      showSettingsView();
      alert(err.message);
    })
    .saveApiKey(key);
}

function removeKey() {
  showSpinner();

  google.script.run
    .withSuccessHandler(function () {
      show('setupView');
    })
    .withFailureHandler(function (err) {
      showSettingsView();
      alert(err.message);
    })
    .clearApiKey();
}

function initialize() {
  showSpinner();

  google.script.run
    .withSuccessHandler(function (state) {
      if (!state.hasApiKey) {
        show('setupView');
        return;
      }

      hasApiKey = true;

      if (INITIAL_STATE.view === 'settings') {
        showSettingsView();
        return;
      }

      show('appView');
      renderActions();

      if (INITIAL_STATE.category && ACTIONS[INITIAL_STATE.category]) {
        $('categorySelect').value = INITIAL_STATE.category;
        renderActions();
      }
    })
    .withFailureHandler(function (err) {
      show('setupView');
      alert(err.message);
    })
    .getAppState();
}

$('categorySelect').addEventListener('change', renderActions);
$('actionSelect').addEventListener('change', renderFields);
$('runBtn').addEventListener('click', runSelectedAction);
$('saveKeyBtn').addEventListener('click', saveFirstKey);
$('updateKeyBtn').addEventListener('click', updateKey);
$('removeKeyBtn').addEventListener('click', removeKey);

function toggleVisibility(inputId, btnId) {
  const input = $(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  $(btnId).querySelector('svg').style.opacity = isHidden ? '0.4' : '1';
}

$('toggleApiKeyBtn').addEventListener('click', function () {
  toggleVisibility('apiKeyInput', 'toggleApiKeyBtn');
});

$('toggleNewApiKeyBtn').addEventListener('click', function () {
  toggleVisibility('newApiKeyInput', 'toggleNewApiKeyBtn');
});

initialize();
</script>
